{% extends "base.html" %}

{% block content %}
  <article class="post">
    <h1 class="post-title">{{ page.title }}</h1>
    <small class="post-meta">
      <time datetime="{{ page.date }}">{{ page.date | date(format="%d %b %Y") }}</time>
      {% if page.extra.authors %}
        <span class="meta-sep">&middot;</span>
        {{ page.extra.authors | join(sep=", ") }}
      {% endif %}
    </small>

    {{ page.content | safe }}
  </article>
{% endblock content %}
